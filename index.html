<!DOCTYPE html>
<html lang="pt-BR" class="antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Assistente Financeiro</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
  </style>

  <!-- 
    FIX: Added ?external=react,react-dom to ensure all libraries share the EXACT 
    same React instance, preventing the "useContext is null" error.
  -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "framer-motion": "https://esm.sh/framer-motion@11.2.10?external=react,react-dom",
        "lucide-react": "https://esm.sh/lucide-react@0.378.0?external=react,react-dom",
        "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
        "zustand": "https://esm.sh/zustand@4.5.2?external=react",
        "react-hook-form": "https://esm.sh/react-hook-form@7.51.4?external=react",
        "date-fns": "https://esm.sh/date-fns@3.6.0",
        "date-fns/locale": "https://esm.sh/date-fns@3.6.0/locale"
      }
    }
  </script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 dark:bg-neutral-950 text-slate-900 dark:text-white transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Home, PieChart, Target, Settings, Plus, X, 
      TrendingUp, TrendingDown, Wallet, Search, Check, 
      AlertCircle, Moon, Sun, Download, Upload, Trash2, Smartphone, 
      ChevronRight, BrainCircuit, Info, Activity, FileText, Goal
    } from 'lucide-react';
    import { AreaChart, Area, Tooltip, ResponsiveContainer } from 'recharts';
    import { motion, AnimatePresence } from 'framer-motion';
    import { create } from 'zustand';
    import { useForm } from 'react-hook-form';
    import { format, isThisMonth, isSameMonth, subMonths, parseISO } from 'date-fns';
    import { ptBR } from 'date-fns/locale';

    const DB_NAME = 'FinanceAppDB';
    const DB_VERSION = 1;

    const openDB = () => {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('transactions')) db.createObjectStore('transactions', { keyPath: 'id' });
          if (!db.objectStoreNames.contains('categories')) db.createObjectStore('categories', { keyPath: 'id' });
          if (!db.objectStoreNames.contains('goals')) db.createObjectStore('goals', { keyPath: 'id' });
          if (!db.objectStoreNames.contains('debts')) db.createObjectStore('debts', { keyPath: 'id' });
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    };

    const dbStore = {
      async toArray(storeName) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, 'readonly');
          const request = tx.objectStore(storeName).getAll();
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      },
      async add(storeName, item) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, 'readwrite');
          const request = tx.objectStore(storeName).put(item);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      },
      async bulkAdd(storeName, items) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          items.forEach(item => store.put(item));
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      },
      async delete(storeName, id) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, 'readwrite');
          const request = tx.objectStore(storeName).delete(id);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      },
      async clear(storeName) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, 'readwrite');
          const request = tx.objectStore(storeName).clear();
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }
    };

    const DEFAULT_CATEGORIES = [
      { id: 'c1', name: 'Alimentação', emoji: '🍔', type: 'expense' },
      { id: 'c2', name: 'Casa', emoji: '🏠', type: 'expense' },
      { id: 'c3', name: 'Transporte', emoji: '🚗', type: 'expense' },
      { id: 'c4', name: 'Mercado', emoji: '🛒', type: 'expense' },
      { id: 'c5', name: 'Lazer', emoji: '🎮', type: 'expense' },
      { id: 'c6', name: 'Saúde', emoji: '❤️', type: 'expense' },
      { id: 'c7', name: 'Assinaturas', emoji: '📱', type: 'expense' },
      { id: 'c8', name: 'Contas', emoji: '💡', type: 'expense' },
      { id: 'c9', name: 'Estudos', emoji: '📚', type: 'expense' },
      { id: 'c10', name: 'Pets', emoji: '🐶', type: 'expense' },
      { id: 'c11', name: 'Salário', emoji: '💼', type: 'income' },
      { id: 'c12', name: 'Freelance', emoji: '💻', type: 'income' },
      { id: 'c13', name: 'Rendimento', emoji: '📈', type: 'income' },
    ];

    const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
    const generateId = () => Math.random().toString(36).substring(2, 9);

    const parseQuickEntry = (text, categories) => {
      const regex = /^(.*?)\s+R?\$\s*(\d+(?:[.,]\d+)?)$|^(.*?)\s+(\d+(?:[.,]\d+)?)$/i;
      const match = text.trim().match(regex);
      if (!match) return null;

      const descriptionPart = (match[1] || match[3] || '').trim();
      let amountStr = (match[2] || match[4] || '').replace(',', '.');
      const amount = parseFloat(amountStr);

      if (isNaN(amount) || !descriptionPart) return null;

      const descLower = descriptionPart.toLowerCase();
      let categoryId = categories.find(c => c.name.toLowerCase() === descLower)?.id;
      let type = 'expense';

      if (!categoryId) {
        if (descLower.includes('mercado') || descLower.includes('extra')) {
          categoryId = categories.find(c => c.name === 'Mercado')?.id;
        } else if (descLower.includes('uber') || descLower.includes('gasolina')) {
          categoryId = categories.find(c => c.name === 'Transporte')?.id;
        } else if (descLower.includes('ifood') || descLower.includes('lanchonete')) {
          categoryId = categories.find(c => c.name === 'Alimentação')?.id;
        } else if (descLower.includes('salário') || descLower.includes('pix')) {
          categoryId = categories.find(c => c.name === 'Salário')?.id;
          type = 'income';
        } else {
          categoryId = categories.find(c => c.type === type)?.id; 
        }
      } else {
        type = categories.find(c => c.id === categoryId)?.type || 'expense';
      }

      return {
        description: descriptionPart.charAt(0).toUpperCase() + descriptionPart.slice(1),
        amount, categoryId, type,
        date: new Date().toISOString()
      };
    };

    const useAppStore = create((set, get) => ({
      currentView: 'dashboard',
      isDark: window.matchMedia('(prefers-color-scheme: dark)').matches,
      transactions: [], categories: [], goals: [], debts: [],
      isBottomSheetOpen: false, snackbarMessage: null,

      setCurrentView: (view) => set({ currentView: view }),
      toggleTheme: () => set((state) => {
        const newDark = !state.isDark;
        document.documentElement.classList.toggle('dark', newDark);
        return { isDark: newDark };
      }),
      setBottomSheetOpen: (isOpen) => set({ isBottomSheetOpen: isOpen }),
      showSnackbar: (msg) => {
        set({ snackbarMessage: msg });
        setTimeout(() => set({ snackbarMessage: null }), 3000);
      },
      hideSnackbar: () => set({ snackbarMessage: null }),

      initialize: async () => {
        let cats = await dbStore.toArray('categories');
        if (cats.length === 0) {
          await dbStore.bulkAdd('categories', DEFAULT_CATEGORIES);
          cats = await dbStore.toArray('categories');
        }
        const rawTransactions = await dbStore.toArray('transactions');
        const transactions = rawTransactions.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());
        const goals = await dbStore.toArray('goals');
        const debts = await dbStore.toArray('debts');
        
        set({ transactions, categories: cats, goals, debts });
        if (get().isDark) document.documentElement.classList.add('dark');
      },

      addTransaction: async (tx) => {
        const newTx = { ...tx, id: generateId() };
        await dbStore.add('transactions', newTx);
        const rawTxs = await dbStore.toArray('transactions');
        set({ transactions: rawTxs.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime()) });
        get().showSnackbar('Transação adicionada!');
      },

      deleteTransaction: async (id) => {
        await dbStore.delete('transactions', id);
        const rawTxs = await dbStore.toArray('transactions');
        set({ transactions: rawTxs.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime()) });
        get().showSnackbar('Transação removida.');
      },

      addGoal: async (goal) => {
        const newGoal = { ...goal, id: generateId() };
        await dbStore.add('goals', newGoal);
        set({ goals: await dbStore.toArray('goals') });
        get().showSnackbar('Objetivo criado!');
      },

      exportData: async () => {
        const data = {
          transactions: await dbStore.toArray('transactions'),
          categories: await dbStore.toArray('categories'),
          goals: await dbStore.toArray('goals'),
          debts: await dbStore.toArray('debts'),
        };
        return JSON.stringify(data);
      },

      importData: async (jsonStr) => {
        try {
          const data = JSON.parse(jsonStr);
          await dbStore.clear('transactions');
          await dbStore.clear('categories');
          await dbStore.clear('goals');
          await dbStore.clear('debts');
          
          if (data.transactions) await dbStore.bulkAdd('transactions', data.transactions);
          if (data.categories) await dbStore.bulkAdd('categories', data.categories);
          if (data.goals) await dbStore.bulkAdd('goals', data.goals);
          if (data.debts) await dbStore.bulkAdd('debts', data.debts);
          
          await get().initialize();
          get().showSnackbar('Dados importados!');
        } catch (e) {
          get().showSnackbar('Erro ao importar arquivo.');
        }
      },

      clearData: async () => {
        await dbStore.clear('transactions');
        await dbStore.clear('goals');
        await dbStore.clear('debts');
        await get().initialize();
        get().showSnackbar('Todos os dados foram apagados.');
      }
    }));

    const Card = ({ children, className = '', onClick }) => (
      <motion.div 
        whileTap={onClick ? { scale: 0.98 } : {}}
        onClick={onClick}
        className={`bg-white dark:bg-neutral-800/80 backdrop-blur-xl border border-slate-100 dark:border-neutral-700/50 rounded-3xl p-5 shadow-sm transition-colors ${className} ${onClick ? 'cursor-pointer' : ''}`}
      >
        {children}
      </motion.div>
    );

    const ProgressBar = ({ progress, color }) => (
      <div className="w-full bg-slate-100 dark:bg-neutral-700 rounded-full h-3 overflow-hidden">
        <motion.div 
          initial={{ width: 0 }}
          animate={{ width: `${Math.min(100, Math.max(0, progress))}%` }}
          transition={{ duration: 1, ease: "easeOut" }}
          className={`h-3 rounded-full ${color}`}
        />
      </div>
    );

    const Snackbar = () => {
      const { snackbarMessage } = useAppStore();
      return (
        <AnimatePresence>
          {snackbarMessage && (
            <motion.div
              initial={{ opacity: 0, y: 50, x: '-50%' }}
              animate={{ opacity: 1, y: 0, x: '-50%' }}
              exit={{ opacity: 0, y: 50, x: '-50%' }}
              className="fixed bottom-24 left-1/2 z-50 bg-neutral-900 dark:bg-white text-white dark:text-neutral-900 px-6 py-3 rounded-full shadow-xl flex items-center gap-2 whitespace-nowrap text-sm font-medium"
            >
              <Check size={16} /> {snackbarMessage}
            </motion.div>
          )}
        </AnimatePresence>
      );
    };

    const getAssistantInsights = (transactions) => {
      const insights = [];
      const now = new Date();
      const lastMonthDate = subMonths(now, 1);
      
      const thisMonthExpenses = transactions.filter(t => t.type === 'expense' && isThisMonth(parseISO(t.date)));
      const lastMonthExpenses = transactions.filter(t => t.type === 'expense' && isSameMonth(parseISO(t.date), lastMonthDate));
      
      const totalThisMonth = thisMonthExpenses.reduce((acc, t) => acc + t.amount, 0);
      const totalLastMonth = lastMonthExpenses.reduce((acc, t) => acc + t.amount, 0);
      
      if (totalLastMonth > 0) {
        const diff = totalLastMonth - totalThisMonth;
        if (diff > 0 && new Date().getDate() > 15) {
          insights.push(`Você economizou ${formatCurrency(diff)} em relação ao mês passado até agora! 🎉`);
        } else if (totalThisMonth > totalLastMonth) {
          insights.push(`Atenção: Seus gastos este mês superaram o mês passado.`);
        }
      }

      if (insights.length === 0) insights.push("Tudo tranquilo por aqui! Continue registrando seus gastos.");
      return insights;
    };

    const SmartAssistantCard = () => {
      const transactions = useAppStore(s => s.transactions);
      const insights = useMemo(() => getAssistantInsights(transactions), [transactions]);
      const [currentIndex, setCurrentIndex] = useState(0);

      useEffect(() => {
        const interval = setInterval(() => setCurrentIndex(prev => (prev + 1) % insights.length), 5000);
        return () => clearInterval(interval);
      }, [insights]);

      if (transactions.length === 0) return null;

      return (
        <Card className="bg-gradient-to-br from-indigo-500 to-purple-600 text-white border-none relative overflow-hidden">
          <div className="absolute top-0 right-0 p-4 opacity-10"><BrainCircuit size={64} /></div>
          <div className="flex items-center gap-2 mb-2 relative z-10">
            <BrainCircuit size={20} className="text-indigo-200" />
            <h3 className="font-semibold text-sm text-indigo-100">Assistente Inteligente</h3>
          </div>
          <AnimatePresence mode="wait">
            <motion.p
              key={currentIndex}
              initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -10 }}
              className="text-lg font-medium leading-tight relative z-10"
            >
              {insights[currentIndex]}
            </motion.p>
          </AnimatePresence>
        </Card>
      );
    };

    const TransactionItem = ({ tx }) => {
      const { categories, deleteTransaction } = useAppStore();
      const category = categories.find(c => c.id === tx.categoryId);
      
      return (
        <motion.div 
          initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }}
          className="bg-white dark:bg-neutral-800/80 p-4 rounded-2xl flex items-center justify-between shadow-sm border border-slate-100 dark:border-neutral-700/50"
        >
          <div className="flex items-center gap-4">
            <div className="w-12 h-12 bg-slate-50 dark:bg-neutral-700 rounded-full flex items-center justify-center text-xl shadow-inner">
              {category?.emoji || '💰'}
            </div>
            <div>
              <p className="font-semibold text-slate-800 dark:text-white">{tx.description}</p>
              <div className="flex items-center gap-2 text-xs text-slate-500 dark:text-neutral-400 mt-1">
                <span>{category?.name}</span>
                <span>•</span>
                <span>{format(parseISO(tx.date), "dd MMM", { locale: ptBR })}</span>
              </div>
            </div>
          </div>
          <div className="text-right">
            <p className={`font-bold ${tx.type === 'income' ? 'text-emerald-500' : 'text-slate-800 dark:text-white'}`}>
              {tx.type === 'income' ? '+' : '-'}{formatCurrency(tx.amount)}
            </p>
            <button onClick={() => deleteTransaction(tx.id)} className="text-xs text-rose-500 mt-1 opacity-60 hover:opacity-100">Excluir</button>
          </div>
        </motion.div>
      );
    };

    const DashboardView = () => {
      const { transactions } = useAppStore();
      const currentMonthTx = useMemo(() => transactions.filter(t => isThisMonth(parseISO(t.date))), [transactions]);
      const income = currentMonthTx.filter(t => t.type === 'income').reduce((acc, t) => acc + t.amount, 0);
      const expense = currentMonthTx.filter(t => t.type === 'expense').reduce((acc, t) => acc + t.amount, 0);
      const balance = income - expense;

      const chartData = useMemo(() => {
        const data = {};
        const days = Array.from({length: new Date().getDate()}, (_, i) => i + 1);
        days.forEach(day => data[day] = { name: day.toString(), income: 0, expense: 0 });
        currentMonthTx.forEach(t => {
          const day = parseISO(t.date).getDate();
          if (data[day]) {
            if (t.type === 'income') data[day].income += t.amount;
            else data[day].expense += t.amount;
          }
        });
        return Object.values(data);
      }, [currentMonthTx]);

      return (
        <div className="pb-24 space-y-6 pt-4 px-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
          <header className="flex justify-between items-center px-2">
            <div>
              <h1 className="text-2xl font-bold text-slate-800 dark:text-white">Visão Geral</h1>
              <p className="text-slate-500 dark:text-neutral-400 text-sm">Neste mês</p>
            </div>
            <div className="w-10 h-10 bg-indigo-100 dark:bg-indigo-900/50 rounded-full flex items-center justify-center text-indigo-600 dark:text-indigo-400">
              <Wallet size={20} />
            </div>
          </header>

          <Card className="bg-slate-900 dark:bg-neutral-800 text-white border-none shadow-xl">
            <p className="text-slate-400 dark:text-neutral-400 text-sm font-medium mb-1">Saldo disponível</p>
            <h2 className="text-4xl font-bold tracking-tight mb-6">{formatCurrency(balance)}</h2>
            <div className="flex justify-between items-center gap-4">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-400"><TrendingUp size={20} /></div>
                <div><p className="text-xs text-slate-400">Ganhos</p><p className="font-semibold">{formatCurrency(income)}</p></div>
              </div>
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full bg-rose-500/20 flex items-center justify-center text-rose-400"><TrendingDown size={20} /></div>
                <div><p className="text-xs text-slate-400">Gastos</p><p className="font-semibold">{formatCurrency(expense)}</p></div>
              </div>
            </div>
          </Card>

          <SmartAssistantCard />

          <Card>
            <div className="flex justify-between items-center mb-4"><h3 className="font-semibold text-slate-800 dark:text-white">Fluxo do Mês</h3><Activity size={16} className="text-slate-400" /></div>
            <div className="h-40 w-full -ml-4">
              <ResponsiveContainer width="100%" height="100%">
                <AreaChart data={chartData}>
                  <defs>
                    <linearGradient id="colorIncome" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#10b981" stopOpacity={0.3}/><stop offset="95%" stopColor="#10b981" stopOpacity={0}/></linearGradient>
                    <linearGradient id="colorExpense" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#f43f5e" stopOpacity={0.3}/><stop offset="95%" stopColor="#f43f5e" stopOpacity={0}/></linearGradient>
                  </defs>
                  <Tooltip contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} />
                  <Area type="monotone" dataKey="income" stroke="#10b981" strokeWidth={3} fillOpacity={1} fill="url(#colorIncome)" />
                  <Area type="monotone" dataKey="expense" stroke="#f43f5e" strokeWidth={3} fillOpacity={1} fill="url(#colorExpense)" />
                </AreaChart>
              </ResponsiveContainer>
            </div>
          </Card>

          <div className="pt-2">
            <h3 className="font-semibold text-slate-800 dark:text-white mb-4 px-2">Últimas Movimentações</h3>
            <div className="space-y-3">
              {transactions.slice(0, 3).map((tx) => <TransactionItem key={tx.id} tx={tx} />)}
              {transactions.length === 0 && <div className="text-center py-8 text-slate-400"><p>Nenhuma movimentação registrada.</p></div>}
            </div>
          </div>
        </div>
      );
    };

    const TransactionsView = () => {
      const { transactions } = useAppStore();
      const [filter, setFilter] = useState('');
      const filtered = transactions.filter(t => t.description.toLowerCase().includes(filter.toLowerCase()));

      return (
        <div className="pb-24 space-y-4 pt-4 px-4 animate-in fade-in">
          <h1 className="text-2xl font-bold text-slate-800 dark:text-white px-2">Movimentações</h1>
          <div className="relative">
            <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={20} />
            <input 
              type="text" placeholder="Buscar gastos ou ganhos..." value={filter} onChange={(e) => setFilter(e.target.value)}
              className="w-full bg-white dark:bg-neutral-800 border-none rounded-2xl py-4 pl-12 pr-4 shadow-sm text-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500"
            />
          </div>
          <div className="space-y-3 mt-6">
            <AnimatePresence>{filtered.map(tx => <TransactionItem key={tx.id} tx={tx} />)}</AnimatePresence>
            {filtered.length === 0 && <div className="text-center py-12 text-slate-400"><Search size={48} className="mx-auto mb-4 opacity-20" /><p>Nenhum registro encontrado.</p></div>}
          </div>
        </div>
      );
    };

    const GoalsView = () => {
      const { goals, addGoal } = useAppStore();
      const [showForm, setShowForm] = useState(false);
      const { register, handleSubmit, reset } = useForm();

      const onSubmit = (data) => {
        addGoal({ name: data.name, targetAmount: parseFloat(data.targetAmount), currentAmount: 0, deadline: data.deadline, color: 'bg-indigo-500' });
        reset(); setShowForm(false);
      };

      return (
        <div className="pb-24 space-y-6 pt-4 px-4 animate-in fade-in">
          <div className="flex justify-between items-center px-2">
            <h1 className="text-2xl font-bold text-slate-800 dark:text-white">Objetivos</h1>
            <button onClick={() => setShowForm(!showForm)} className="bg-indigo-100 text-indigo-600 dark:bg-indigo-900/50 dark:text-indigo-400 px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-1">
              {showForm ? <X size={16} /> : <Plus size={16} />} {showForm ? 'Cancelar' : 'Novo'}
            </button>
          </div>

          <AnimatePresence>
            {showForm && (
              <motion.div initial={{ height: 0, opacity: 0 }} animate={{ height: 'auto', opacity: 1 }} exit={{ height: 0, opacity: 0 }} className="overflow-hidden">
                <Card className="mb-6">
                  <form onSubmit={handleSubmit(onSubmit)} className="space-y-4">
                    <input {...register('name', { required: true })} placeholder="Nome (ex: Viagem)" className="w-full p-3 rounded-xl bg-slate-50 dark:bg-neutral-900 border-none outline-none" />
                    <input {...register('targetAmount', { required: true })} type="number" step="0.01" placeholder="Valor R$" className="w-full p-3 rounded-xl bg-slate-50 dark:bg-neutral-900 border-none outline-none" />
                    <input {...register('deadline', { required: true })} type="date" className="w-full p-3 rounded-xl bg-slate-50 dark:bg-neutral-900 border-none outline-none text-slate-500" />
                    <button type="submit" className="w-full bg-indigo-600 text-white font-semibold p-3 rounded-xl">Criar Objetivo</button>
                  </form>
                </Card>
              </motion.div>
            )}
          </AnimatePresence>

          <div className="space-y-4">
            {goals.map(goal => {
              const progress = (goal.currentAmount / goal.targetAmount) * 100;
              return (
                <Card key={goal.id}>
                  <div className="flex justify-between items-end mb-4">
                    <div>
                      <h3 className="font-bold text-lg text-slate-800 dark:text-white">{goal.name}</h3>
                      <p className="text-slate-500 text-sm mt-1">Faltam {formatCurrency(goal.targetAmount - goal.currentAmount)}</p>
                    </div>
                    <div className="text-right"><span className="font-bold text-indigo-600 dark:text-indigo-400 text-xl">{progress.toFixed(0)}%</span></div>
                  </div>
                  <ProgressBar progress={progress} color={goal.color} />
                </Card>
              );
            })}
            {goals.length === 0 && !showForm && (
              <div className="text-center py-16">
                <Goal size={64} className="mx-auto text-slate-300 dark:text-neutral-700 mb-4" />
                <h3 className="text-lg font-semibold text-slate-700 dark:text-neutral-300">Sem objetivos ainda</h3>
                <button onClick={() => setShowForm(true)} className="mt-6 bg-indigo-600 text-white px-6 py-3 rounded-full font-semibold shadow-lg shadow-indigo-600/30 active:scale-95 transition-all">
                  Criar primeiro objetivo
                </button>
              </div>
            )}
          </div>
        </div>
      );
    };

    const SettingsView = () => {
      const { isDark, toggleTheme, exportData, importData, clearData } = useAppStore();
      const fileInputRef = React.useRef(null);
      const [showConfirmDelete, setShowConfirmDelete] = useState(false);

      const handleExport = async () => {
        const jsonStr = await exportData();
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `finance_backup_${format(new Date(), 'yyyy-MM-dd')}.json`;
        a.click(); URL.revokeObjectURL(url);
      };

      const handleImport = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => await importData(e.target.result);
        reader.readAsText(file);
      };

      return (
        <div className="pb-24 space-y-6 pt-4 px-4 animate-in fade-in">
          <h1 className="text-2xl font-bold text-slate-800 dark:text-white px-2">Configurações</h1>

          <div className="space-y-4">
            <Card className="!p-0 overflow-hidden divide-y divide-slate-100 dark:divide-neutral-700/50">
              <div className="p-4 flex justify-between items-center bg-slate-50/50 dark:bg-neutral-800/50">
                <div className="flex items-center gap-3">{isDark ? <Moon className="text-indigo-500" /> : <Sun className="text-orange-500" />}<span className="font-medium text-slate-800 dark:text-white">Modo Escuro</span></div>
                <button onClick={toggleTheme} className={`w-12 h-6 rounded-full p-1 transition-colors ${isDark ? 'bg-indigo-500' : 'bg-slate-300'}`}>
                  <motion.div layout className="w-4 h-4 bg-white rounded-full shadow-sm" animate={{ x: isDark ? 24 : 0 }} />
                </button>
              </div>
              <div onClick={handleExport} className="p-4 flex items-center justify-between cursor-pointer active:bg-slate-50 dark:active:bg-neutral-700/50">
                <div className="flex items-center gap-3"><Download className="text-emerald-500" /><span className="font-medium text-slate-800 dark:text-white">Exportar Backup</span></div><ChevronRight className="text-slate-400" size={20} />
              </div>
              <div onClick={() => fileInputRef.current?.click()} className="p-4 flex items-center justify-between cursor-pointer active:bg-slate-50 dark:active:bg-neutral-700/50">
                <div className="flex items-center gap-3"><Upload className="text-amber-500" /><span className="font-medium text-slate-800 dark:text-white">Importar Backup</span></div><ChevronRight className="text-slate-400" size={20} />
                <input type="file" accept=".json" className="hidden" ref={fileInputRef} onChange={handleImport} />
              </div>
            </Card>

            <Card className="!p-0 border-rose-100 dark:border-rose-900/30">
              {!showConfirmDelete ? (
                <div onClick={() => setShowConfirmDelete(true)} className="p-4 flex items-center gap-3 cursor-pointer text-rose-500">
                  <Trash2 /><span className="font-medium">Apagar todos os dados</span>
                </div>
              ) : (
                <div className="p-4 flex flex-col gap-4 bg-rose-50/50 dark:bg-rose-900/10">
                  <div className="flex items-start gap-3 text-rose-600 dark:text-rose-400"><AlertCircle size={20} className="shrink-0 mt-0.5" /><span className="font-medium text-sm">Tem certeza? Isso apagará tudo permanentemente.</span></div>
                  <div className="flex gap-2">
                    <button onClick={() => setShowConfirmDelete(false)} className="flex-1 py-2.5 bg-white dark:bg-neutral-800 rounded-xl font-medium border">Cancelar</button>
                    <button onClick={() => { clearData(); setShowConfirmDelete(false); }} className="flex-1 py-2.5 bg-rose-500 text-white rounded-xl font-medium">Apagar</button>
                  </div>
                </div>
              )}
            </Card>
          </div>
          <div className="mt-8 p-4 bg-indigo-50 dark:bg-indigo-900/20 rounded-3xl text-indigo-800 dark:text-indigo-200 text-sm">
            <h4 className="font-bold flex items-center gap-2 mb-2"><Info size={16}/> Sobre o App</h4>
            <p><strong>100% Offline:</strong> Seus dados ficam apenas no seu aparelho.</p>
          </div>
        </div>
      );
    };

    const AddTransactionSheet = () => {
      const { isBottomSheetOpen, setBottomSheetOpen, categories, addTransaction } = useAppStore();
      const [quickText, setQuickText] = useState('');
      
      const { register, handleSubmit, reset, setValue, watch } = useForm({
        defaultValues: { type: 'expense', amount: '', categoryId: '', description: '', date: new Date().toISOString().substring(0, 10) }
      });
      const type = watch('type');
      const filteredCategories = categories.filter(c => c.type === type);

      useEffect(() => {
        if (quickText.length > 3) {
          const parsed = parseQuickEntry(quickText, categories);
          if (parsed) {
            setValue('description', parsed.description || '');
            setValue('amount', parsed.amount?.toString() || '');
            setValue('categoryId', parsed.categoryId || '');
            setValue('type', parsed.type || 'expense');
          }
        }
      }, [quickText, categories, setValue]);

      const onSubmit = (data) => {
        if (!data.amount || !data.categoryId || !data.description) return;
        addTransaction({
          amount: parseFloat(data.amount), categoryId: data.categoryId, description: data.description,
          date: new Date(data.date).toISOString(), type: data.type, isRecurring: false
        });
        setQuickText(''); reset(); setBottomSheetOpen(false);
      };

      return (
        <AnimatePresence>
          {isBottomSheetOpen && (
            <>
              <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 bg-black/40 backdrop-blur-sm z-40" onClick={() => setBottomSheetOpen(false)} />
              <motion.div initial={{ y: '100%' }} animate={{ y: 0 }} exit={{ y: '100%' }} transition={{ type: 'spring', damping: 25, stiffness: 200 }} className="fixed bottom-0 left-0 right-0 bg-white dark:bg-neutral-900 rounded-t-[2rem] z-50 p-6 shadow-2xl h-[85vh] overflow-y-auto">
                <div className="w-12 h-1.5 bg-slate-200 dark:bg-neutral-700 rounded-full mx-auto mb-6" />
                <h2 className="text-xl font-bold mb-4 text-slate-800 dark:text-white">Nova Movimentação</h2>
                
                <div className="mb-6 relative">
                  <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><BrainCircuit className="text-indigo-400" size={20} /></div>
                  <input type="text" placeholder="Lançamento Mágico (ex: Uber 25)" value={quickText} onChange={(e) => setQuickText(e.target.value)} className="w-full bg-indigo-50 dark:bg-indigo-900/20 text-indigo-900 dark:text-indigo-100 rounded-2xl py-4 pl-12 pr-4 font-medium outline-none" />
                </div>

                <form onSubmit={handleSubmit(onSubmit)} className="space-y-4">
                  <div className="flex bg-slate-100 dark:bg-neutral-800 rounded-2xl p-1">
                    <button type="button" onClick={() => setValue('type', 'expense')} className={`flex-1 py-3 text-sm font-semibold rounded-xl ${type === 'expense' ? 'bg-white dark:bg-neutral-700 shadow text-rose-500' : 'text-slate-500'}`}>Gasto</button>
                    <button type="button" onClick={() => setValue('type', 'income')} className={`flex-1 py-3 text-sm font-semibold rounded-xl ${type === 'income' ? 'bg-white dark:bg-neutral-700 shadow text-emerald-500' : 'text-slate-500'}`}>Ganho</button>
                  </div>
                  <div className="relative">
                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">R$</span>
                    <input {...register('amount')} type="number" step="0.01" placeholder="0,00" className="w-full bg-slate-50 dark:bg-neutral-800 rounded-2xl py-4 pl-12 pr-4 text-2xl font-bold outline-none" />
                  </div>
                  <input {...register('description')} type="text" placeholder="Descrição" className="w-full bg-slate-50 dark:bg-neutral-800 rounded-2xl py-4 px-4 outline-none" />
                  
                  <div className="grid grid-cols-4 gap-2">
                    {filteredCategories.map(cat => (
                      <div key={cat.id} onClick={() => setValue('categoryId', cat.id)} className={`cursor-pointer flex flex-col items-center justify-center p-3 rounded-2xl ${watch('categoryId') === cat.id ? 'bg-indigo-100 dark:bg-indigo-900/50 border-indigo-500' : 'bg-slate-50 dark:bg-neutral-800 border-transparent'} border`}>
                        <span className="text-2xl mb-1">{cat.emoji}</span>
                        <span className="text-[10px] font-medium text-center leading-tight text-slate-600 dark:text-slate-400">{cat.name}</span>
                      </div>
                    ))}
                  </div>
                  <input {...register('date')} type="date" className="w-full bg-slate-50 dark:bg-neutral-800 rounded-2xl py-4 px-4 text-slate-500 outline-none" />
                  <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl text-lg mt-4 shadow-lg active:scale-95">Salvar</button>
                </form>
              </motion.div>
            </>
          )}
        </AnimatePresence>
      );
    };

    const BottomNav = () => {
      const { currentView, setCurrentView, setBottomSheetOpen } = useAppStore();
      const navItems = [
        { id: 'dashboard', icon: Home, label: 'Início' },
        { id: 'transactions', icon: PieChart, label: 'Gastos' },
        { id: 'add', icon: Plus, label: '', isFab: true },
        { id: 'goals', icon: Target, label: 'Objetivos' },
        { id: 'settings', icon: Settings, label: 'Ajustes' },
      ];

      return (
        <div className="fixed bottom-0 w-full max-w-md mx-auto bg-white/80 dark:bg-neutral-900/80 backdrop-blur-xl border-t border-slate-100 dark:border-neutral-800 px-6 py-3 flex justify-between items-center z-30 pb-safe">
          {navItems.map((item) => {
            if (item.isFab) {
              return (
                <motion.button key="fab" whileTap={{ scale: 0.9 }} onClick={() => setBottomSheetOpen(true)} className="bg-indigo-600 text-white p-4 rounded-full shadow-lg shadow-indigo-600/30 -mt-8 relative z-10">
                  <Plus size={24} />
                </motion.button>
              );
            }
            const isActive = currentView === item.id;
            return (
              <button key={item.id} onClick={() => setCurrentView(item.id)} className={`flex flex-col items-center gap-1 p-2 ${isActive ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-400 dark:text-neutral-500'}`}>
                <item.icon size={24} strokeWidth={isActive ? 2.5 : 2} />
                <span className="text-[10px] font-medium">{item.label}</span>
              </button>
            );
          })}
        </div>
      );
    };

    const App = () => {
      const { initialize, currentView } = useAppStore();
      const [isLoaded, setIsLoaded] = useState(false);

      useEffect(() => { initialize().then(() => setIsLoaded(true)); }, [initialize]);

      if (!isLoaded) return <div className="min-h-screen flex items-center justify-center"><motion.div animate={{ rotate: 360 }} transition={{ repeat: Infinity, duration: 1, ease: "linear" }}><Wallet size={48} className="text-indigo-600" /></motion.div></div>;

      return (
        <div className="min-h-screen mx-auto max-w-md relative shadow-2xl overflow-x-hidden">
          <main className="min-h-screen">
            {currentView === 'dashboard' && <DashboardView />}
            {currentView === 'transactions' && <TransactionsView />}
            {currentView === 'goals' && <GoalsView />}
            {currentView === 'settings' && <SettingsView />}
          </main>
          <BottomNav />
          <AddTransactionSheet />
          <Snackbar />
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
