<!DOCTYPE html>
<html lang="pt-BR" class="antialiased dark" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Assistente Financeiro</title>
  
  <!-- Configurações para PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  
  <style>
    body { 
      -webkit-tap-highlight-color: transparent; 
      background-color: #0a0a0a; /* Fundo escuro fixo */
    }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    
    /* Garante visibilidade nos inputs em modo escuro */
    input { color: #f8fafc !important; }
    input::placeholder { color: #64748b !important; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "framer-motion": "https://esm.sh/framer-motion@11.2.10?external=react,react-dom",
        "lucide-react": "https://esm.sh/lucide-react@0.378.0?external=react,react-dom",
        "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
        "zustand": "https://esm.sh/zustand@4.5.2?external=react",
        "react-hook-form": "https://esm.sh/react-hook-form@7.51.4?external=react",
        "date-fns": "https://esm.sh/date-fns@3.6.0",
        "date-fns/locale": "https://esm.sh/date-fns@3.6.0/locale"
      }
    }
  </script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-white transition-colors duration-300">
  <div id="root"></div>

  <script>
    // Registra o Service Worker apenas se estiver rodando em HTTPS ou Localhost (evita erros no preview)
    if ('serviceWorker' in navigator && (window.location.protocol === 'https:' || window.location.hostname === 'localhost')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          console.log('Service Worker Registrado!', reg);
        }).catch(err => console.warn('Ambiente local, SW não registrado.', err));
      });
    }
  </script>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Home, PieChart, Target, Settings, Plus, X, 
      TrendingUp, TrendingDown, Wallet, Search, Check, 
      AlertCircle, Download, Upload, Trash2, Smartphone, 
      ChevronRight, ChevronLeft, BrainCircuit, Info, Activity, FileText, Goal,
      RefreshCw, CheckSquare, Square
    } from 'lucide-react';
    import { AreaChart, Area, BarChart, Bar, Tooltip, ResponsiveContainer, XAxis, CartesianGrid, Cell } from 'recharts';
    import { motion, AnimatePresence } from 'framer-motion';
    import { create } from 'zustand';
    import { useForm } from 'react-hook-form';
    import { format, isSameMonth, subMonths, addMonths, parseISO, endOfMonth, getDate } from 'date-fns';
    import { ptBR } from 'date-fns/locale';

    const DB_NAME = 'FinanceAppDB';
    const DB_VERSION = 2; // Atualizado para suportar itens Fixos

    const openDB = () => {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('transactions')) db.createObjectStore('transactions', { keyPath: 'id' });
          if (!db.objectStoreNames.contains('categories')) db.createObjectStore('categories', { keyPath: 'id' });
          if (!db.objectStoreNames.contains('goals')) db.createObjectStore('goals', { keyPath: 'id' });
          if (!db.objectStoreNames.contains('debts')) db.createObjectStore('debts', { keyPath: 'id' });
          if (!db.objectStoreNames.contains('fixedItems')) db.createObjectStore('fixedItems', { keyPath: 'id' });
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    };

    const dbStore = {
      async toArray(storeName) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const request = db.transaction(storeName, 'readonly').objectStore(storeName).getAll();
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      },
      async add(storeName, item) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const request = db.transaction(storeName, 'readwrite').objectStore(storeName).put(item);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      },
      async bulkAdd(storeName, items) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          items.forEach(item => store.put(item));
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      },
      async delete(storeName, id) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const request = db.transaction(storeName, 'readwrite').objectStore(storeName).delete(id);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      },
      async clear(storeName) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const request = db.transaction(storeName, 'readwrite').objectStore(storeName).clear();
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }
    };

    const DEFAULT_CATEGORIES = [
      { id: 'c1', name: 'Alimentação', emoji: '🍔', type: 'expense' },
      { id: 'c2', name: 'Casa', emoji: '🏠', type: 'expense' },
      { id: 'c3', name: 'Transporte', emoji: '🚗', type: 'expense' },
      { id: 'c4', name: 'Mercado', emoji: '🛒', type: 'expense' },
      { id: 'c5', name: 'Lazer', emoji: '🎮', type: 'expense' },
      { id: 'c6', name: 'Saúde', emoji: '❤️', type: 'expense' },
      { id: 'c7', name: 'Assinaturas', emoji: '📱', type: 'expense' },
      { id: 'c8', name: 'Contas Fixas', emoji: '💡', type: 'expense' },
      { id: 'c9', name: 'Salário', emoji: '💼', type: 'income' },
      { id: 'c10', name: 'Rendimento', emoji: '📈', type: 'income' },
      { id: 'c11', name: 'Objetivos', emoji: '🎯', type: 'expense' },
    ];

    const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
    const generateId = () => Math.random().toString(36).substring(2, 9);

    const parseQuickEntry = (text, categories) => {
      const regex = /^(.*?)\s+R?\$\s*(\d+(?:[.,]\d+)?)$|^(.*?)\s+(\d+(?:[.,]\d+)?)$/i;
      const match = text.trim().match(regex);
      if (!match) return null;

      const descriptionPart = (match[1] || match[3] || '').trim();
      let amountStr = (match[2] || match[4] || '').replace(',', '.');
      const amount = parseFloat(amountStr);
      if (isNaN(amount) || !descriptionPart) return null;

      const descLower = descriptionPart.toLowerCase();
      let categoryId = categories.find(c => c.name.toLowerCase() === descLower)?.id;
      let type = 'expense';

      if (!categoryId) {
        if (descLower.includes('mercado') || descLower.includes('extra')) categoryId = categories.find(c => c.name === 'Mercado')?.id;
        else if (descLower.includes('uber') || descLower.includes('gasolina')) categoryId = categories.find(c => c.name === 'Transporte')?.id;
        else if (descLower.includes('ifood') || descLower.includes('lanchonete')) categoryId = categories.find(c => c.name === 'Alimentação')?.id;
        else if (descLower.includes('salário') || descLower.includes('pix')) { categoryId = categories.find(c => c.name === 'Salário')?.id; type = 'income'; }
        else categoryId = categories.find(c => c.type === type)?.id; 
      } else {
        type = categories.find(c => c.id === categoryId)?.type || 'expense';
      }

      return { description: descriptionPart.charAt(0).toUpperCase() + descriptionPart.slice(1), amount, categoryId, type, date: new Date().toISOString() };
    };

    const useAppStore = create((set, get) => ({
      currentView: 'dashboard',
      currentDate: new Date(),
      transactions: [], categories: [], goals: [], debts: [], fixedItems: [],
      isBottomSheetOpen: false, snackbarMessage: null, editingTx: null,

      setCurrentView: (view) => set({ currentView: view }),
      setCurrentDate: (date) => set({ currentDate: date }),
      setBottomSheetOpen: (isOpen) => { set({ isBottomSheetOpen: isOpen }); if (!isOpen) set({ editingTx: null }); },
      setEditingTx: (tx) => set({ editingTx: tx, isBottomSheetOpen: true }),
      showSnackbar: (msg) => { set({ snackbarMessage: msg }); setTimeout(() => set({ snackbarMessage: null }), 3000); },

      initialize: async () => {
        let cats = await dbStore.toArray('categories');
        if (cats.length === 0) { await dbStore.bulkAdd('categories', DEFAULT_CATEGORIES); cats = await dbStore.toArray('categories'); }
        const txs = await dbStore.toArray('transactions');
        set({ 
          categories: cats, 
          transactions: txs.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime()), 
          goals: await dbStore.toArray('goals'), 
          debts: await dbStore.toArray('debts'),
          fixedItems: await dbStore.toArray('fixedItems')
        });
      },

      addTransaction: async (tx) => {
        const newTx = { ...tx, id: generateId() };
        await dbStore.add('transactions', newTx);
        const txs = await dbStore.toArray('transactions');
        set({ transactions: txs.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime()) });
        get().showSnackbar('Movimentação adicionada!');
      },

      updateTransaction: async (id, tx) => {
        await dbStore.add('transactions', { ...tx, id });
        const txs = await dbStore.toArray('transactions');
        set({ transactions: txs.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime()) });
        get().showSnackbar('Movimentação atualizada!');
      },

      deleteTransaction: async (id) => {
        await dbStore.delete('transactions', id);
        const txs = await dbStore.toArray('transactions');
        set({ transactions: txs.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime()) });
        get().showSnackbar('Removido.');
      },

      // Funções para Contas e Ganhos Fixos
      addFixedItem: async (item) => {
        await dbStore.add('fixedItems', { ...item, id: generateId() });
        set({ fixedItems: await dbStore.toArray('fixedItems') });
        get().showSnackbar('Item fixo adicionado!');
      },
      updateFixedItem: async (id, item) => {
        await dbStore.add('fixedItems', { ...item, id });
        set({ fixedItems: await dbStore.toArray('fixedItems') });
        get().showSnackbar('Item fixo atualizado!');
      },
      deleteFixedItem: async (id) => {
        await dbStore.delete('fixedItems', id);
        set({ fixedItems: await dbStore.toArray('fixedItems') });
        get().showSnackbar('Item fixo excluído.');
      },
      toggleFixedPayment: async (fixedItem, dateObj, isAlreadyPaid) => {
        if (isAlreadyPaid) {
          const tx = get().transactions.find(t => t.fixedItemId === fixedItem.id && isSameMonth(parseISO(t.date), dateObj));
          if (tx) await get().deleteTransaction(tx.id);
        } else {
          await get().addTransaction({
            description: fixedItem.description, amount: fixedItem.amount,
            categoryId: fixedItem.categoryId, type: fixedItem.type,
            date: new Date(dateObj.getFullYear(), dateObj.getMonth(), new Date().getDate(), 12).toISOString(),
            fixedItemId: fixedItem.id
          });
        }
      },

      addGoal: async (goal) => { await dbStore.add('goals', { ...goal, id: generateId() }); set({ goals: await dbStore.toArray('goals') }); get().showSnackbar('Objetivo criado!'); },
      updateGoal: async (id, goal) => { await dbStore.add('goals', { ...goal, id }); set({ goals: await dbStore.toArray('goals') }); get().showSnackbar('Objetivo atualizado!'); },
      deleteGoal: async (id) => { await dbStore.delete('goals', id); set({ goals: await dbStore.toArray('goals') }); },
      addFundsToGoal: async (goalId, amount) => {
        const { goals, addTransaction, categories } = get();
        const goal = goals.find(g => g.id === goalId);
        if (!goal) return;
        await dbStore.add('goals', { ...goal, currentAmount: (goal.currentAmount || 0) + amount });
        set({ goals: await dbStore.toArray('goals') });
        let cat = categories.find(c => c.name === 'Objetivos') || categories[0];
        await addTransaction({ description: `Guardado: ${goal.name}`, amount, categoryId: cat.id, type: 'expense', date: new Date().toISOString() });
        get().showSnackbar('Valor guardado com sucesso!');
      },

      addDebt: async (debt) => { await dbStore.add('debts', { ...debt, id: generateId(), amountPaid: 0 }); set({ debts: await dbStore.toArray('debts') }); get().showSnackbar('Dívida registrada!'); },
      updateDebt: async (id, debt) => { await dbStore.add('debts', { ...debt, id }); set({ debts: await dbStore.toArray('debts') }); get().showSnackbar('Dívida atualizada!'); },
      deleteDebt: async (id) => { await dbStore.delete('debts', id); set({ debts: await dbStore.toArray('debts') }); },
      payDebt: async (debtId, amount) => {
        const { debts, addTransaction, categories } = get();
        const debt = debts.find(d => d.id === debtId);
        if (!debt) return;
        await dbStore.add('debts', { ...debt, amountPaid: (debt.amountPaid || 0) + amount });
        set({ debts: await dbStore.toArray('debts') });
        let cat = categories.find(c => c.name === 'Contas Fixas') || categories[0];
        await addTransaction({ description: `Pagamento Dívida: ${debt.personOrInstitution}`, amount, categoryId: cat.id, type: 'expense', date: new Date().toISOString() });
        get().showSnackbar('Pagamento registrado no seu saldo!');
      },

      exportData: async () => {
        const data = {
          transactions: await dbStore.toArray('transactions'), categories: await dbStore.toArray('categories'),
          goals: await dbStore.toArray('goals'), debts: await dbStore.toArray('debts'), fixedItems: await dbStore.toArray('fixedItems')
        };
        return JSON.stringify(data);
      },
      importData: async (jsonStr) => {
        try {
          const data = JSON.parse(jsonStr);
          await dbStore.clear('transactions'); await dbStore.clear('categories'); await dbStore.clear('goals'); await dbStore.clear('debts'); await dbStore.clear('fixedItems');
          if (data.transactions) await dbStore.bulkAdd('transactions', data.transactions);
          if (data.categories) await dbStore.bulkAdd('categories', data.categories);
          if (data.goals) await dbStore.bulkAdd('goals', data.goals);
          if (data.debts) await dbStore.bulkAdd('debts', data.debts);
          if (data.fixedItems) await dbStore.bulkAdd('fixedItems', data.fixedItems);
          await get().initialize(); get().showSnackbar('Dados importados!');
        } catch (e) { get().showSnackbar('Erro ao importar arquivo.'); }
      },
      clearData: async () => {
        await dbStore.clear('transactions'); await dbStore.clear('goals'); await dbStore.clear('debts'); await dbStore.clear('fixedItems');
        await get().initialize(); get().showSnackbar('Todos os dados foram apagados.');
      }
    }));

    const Card = ({ children, className = '', onClick }) => (
      <motion.div whileTap={onClick ? { scale: 0.98 } : {}} onClick={onClick} className={`bg-neutral-900 border border-neutral-800 rounded-3xl p-5 shadow-lg ${className} ${onClick ? 'cursor-pointer' : ''}`}>
        {children}
      </motion.div>
    );

    const ProgressBar = ({ progress, color }) => (
      <div className="w-full bg-neutral-800 rounded-full h-3 overflow-hidden">
        <motion.div initial={{ width: 0 }} animate={{ width: `${Math.min(100, Math.max(0, progress))}%` }} transition={{ duration: 1, ease: "easeOut" }} className={`h-3 rounded-full ${color}`} />
      </div>
    );

    const Snackbar = () => {
      const { snackbarMessage } = useAppStore();
      return (
        <AnimatePresence>
          {snackbarMessage && (
            <motion.div initial={{ opacity: 0, y: 50, x: '-50%' }} animate={{ opacity: 1, y: 0, x: '-50%' }} exit={{ opacity: 0, y: 50, x: '-50%' }} className="fixed bottom-24 left-1/2 z-50 bg-white text-neutral-900 px-6 py-3 rounded-full shadow-xl flex items-center gap-2 whitespace-nowrap text-sm font-medium">
              <Check size={16} /> {snackbarMessage}
            </motion.div>
          )}
        </AnimatePresence>
      );
    };

    const getAssistantInsights = (transactions, currentDate) => {
      const insights = [];
      const lastMonthDate = subMonths(currentDate, 1);
      const thisMonthTx = transactions.filter(t => isSameMonth(parseISO(t.date), currentDate));
      const lastMonthTx = transactions.filter(t => isSameMonth(parseISO(t.date), lastMonthDate));
      
      const thisMonthExpenses = thisMonthTx.filter(t => t.type === 'expense').reduce((acc, t) => acc + t.amount, 0);
      const lastMonthExpenses = lastMonthTx.filter(t => t.type === 'expense').reduce((acc, t) => acc + t.amount, 0);
      
      if (lastMonthExpenses > 0) {
        const diff = lastMonthExpenses - thisMonthExpenses;
        if (diff > 0 && new Date().getDate() > 15 && isSameMonth(currentDate, new Date())) {
          insights.push(`Você economizou ${formatCurrency(diff)} este mês! 🎉`);
        } else if (thisMonthExpenses > lastMonthExpenses) {
          insights.push(`Seus gastos superaram o mês passado.`);
        }
      }

      if (thisMonthTx.length === 0) insights.push("Nenhuma movimentação neste mês.");
      else if (insights.length === 0) insights.push("Tudo sob controle! ✌️");
      return insights;
    };

    const MiniAssistantBubble = ({ transactions, currentDate }) => {
      const insights = useMemo(() => getAssistantInsights(transactions, currentDate), [transactions, currentDate]);
      const [currentIndex, setCurrentIndex] = useState(0);

      useEffect(() => {
        if (insights.length <= 1) return;
        const interval = setInterval(() => setCurrentIndex(prev => (prev + 1) % insights.length), 5000);
        return () => clearInterval(interval);
      }, [insights]);

      if (transactions.length === 0) return null;

      return (
        <div className="absolute -top-6 right-4 z-10 bg-indigo-500 text-white text-[11px] font-bold py-2 px-3 rounded-2xl rounded-br-sm shadow-lg shadow-indigo-500/30 flex items-center gap-1.5 max-w-[200px]">
          <BrainCircuit size={14} className="shrink-0 text-indigo-100" />
          <AnimatePresence mode="wait">
            <motion.span key={currentIndex} initial={{ opacity: 0, y: 2 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -2 }} className="leading-tight truncate">
              {insights[currentIndex]}
            </motion.span>
          </AnimatePresence>
        </div>
      );
    };

    const TransactionItem = ({ tx }) => {
      const { categories, deleteTransaction, setEditingTx } = useAppStore();
      const category = categories.find(c => c.id === tx.categoryId);
      return (
        <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} className="bg-neutral-900 p-4 rounded-2xl flex items-center justify-between shadow-sm border border-neutral-800">
          <div className="flex items-center gap-4">
            <div className="w-12 h-12 bg-neutral-800 rounded-full flex items-center justify-center text-xl shadow-inner">{category?.emoji || '💰'}</div>
            <div>
              <p className="font-semibold text-white">{tx.description}</p>
              <div className="flex items-center gap-2 text-xs text-neutral-400 mt-1">
                <span>{category?.name}</span><span>•</span><span>{format(parseISO(tx.date), "dd MMM", { locale: ptBR })}</span>
                {tx.fixedItemId && <span className="text-indigo-400 font-semibold flex items-center"><RefreshCw size={10} className="mr-0.5"/> Fixo</span>}
              </div>
            </div>
          </div>
          <div className="text-right flex flex-col items-end">
            <p className={`font-bold ${tx.type === 'income' ? 'text-emerald-500' : 'text-white'}`}>{tx.type === 'income' ? '+' : '-'}{formatCurrency(tx.amount)}</p>
            <div className="flex gap-3 mt-2">
              <button onClick={() => setEditingTx(tx)} className="text-xs font-medium text-indigo-400 opacity-80 hover:opacity-100">Editar</button>
              <button onClick={() => deleteTransaction(tx.id)} className="text-xs font-medium text-rose-500 opacity-80 hover:opacity-100">Excluir</button>
            </div>
          </div>
        </motion.div>
      );
    };

    const DashboardView = () => {
      const { transactions, setCurrentView, currentDate, setCurrentDate, goals } = useAppStore();
      const currentMonthTx = useMemo(() => transactions.filter(t => isSameMonth(parseISO(t.date), currentDate)), [transactions, currentDate]);
      const income = currentMonthTx.filter(t => t.type === 'income').reduce((acc, t) => acc + t.amount, 0);
      const expense = currentMonthTx.filter(t => t.type === 'expense').reduce((acc, t) => acc + t.amount, 0);
      const balance = income - expense;
      const totalSaved = goals.reduce((acc, g) => acc + (g.currentAmount || 0), 0);

      const handlePrevMonth = () => setCurrentDate(subMonths(currentDate, 1));
      const handleNextMonth = () => setCurrentDate(addMonths(currentDate, 1));

      const chartData = useMemo(() => {
        const data = {};
        const daysInMonth = getDate(endOfMonth(currentDate));
        const days = Array.from({length: daysInMonth}, (_, i) => i + 1);
        days.forEach(day => data[day] = { name: day.toString(), Ganhos: 0, Gastos: 0 });
        currentMonthTx.forEach(t => {
          const day = parseISO(t.date).getDate();
          if (data[day]) {
            if (t.type === 'income') data[day].Ganhos += t.amount;
            else data[day].Gastos += t.amount;
          }
        });
        return Object.values(data);
      }, [currentMonthTx, currentDate]);

      return (
        <div className="pb-24 space-y-6 pt-4 px-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
          <header className="flex justify-between items-center px-2">
            <div>
              <h1 className="text-2xl font-bold text-white">Visão Geral</h1>
              <div className="flex items-center gap-2 mt-1 -ml-2">
                <button onClick={handlePrevMonth} className="p-2 rounded-full text-neutral-400 hover:bg-neutral-800 transition-colors"><ChevronLeft size={18} /></button>
                <span className="text-neutral-300 text-sm font-bold capitalize min-w-[100px] text-center">{format(currentDate, 'MMMM yyyy', { locale: ptBR })}</span>
                <button onClick={handleNextMonth} className="p-2 rounded-full text-neutral-400 hover:bg-neutral-800 transition-colors"><ChevronRight size={18} /></button>
              </div>
            </div>
            <button onClick={() => setCurrentView('settings')} className="w-10 h-10 bg-indigo-900/50 rounded-full flex items-center justify-center text-indigo-400 shadow-sm active:scale-95 transition-transform"><Settings size={20} /></button>
          </header>

          <Card className="bg-neutral-900 text-white border-none shadow-2xl">
            <p className="text-neutral-400 text-sm font-medium mb-1">Saldo do mês</p>
            <h2 className="text-4xl font-bold tracking-tight mb-6">{formatCurrency(balance)}</h2>
            <div className="flex justify-between items-center gap-4 mb-4">
              <div className="flex items-center gap-3">

          <div className="flex items-center gap-3 px-2">
            <button onClick={() => setCurrentView('dashboard')} className="p-2 -ml-2 bg-neutral-800 rounded-full text-neutral-300"><ChevronLeft size={20} /></button>
            <h1 className="text-2xl font-bold text-white">Configurações</h1>
          </div>
          <div className="space-y-4">
            <Card className="!p-0 overflow-hidden divide-y divide-neutral-800">
              <div onClick={handleExport} className="p-4 flex items-center justify-between cursor-pointer active:bg-neutral-800"><div className="flex items-center gap-3"><Download className="text-emerald-500" /><span className="font-medium text-white">Exportar Backup</span></div><ChevronRight className="text-neutral-500" size={20} /></div>
              <div onClick={() => fileInputRef.current?.click()} className="p-4 flex items-center justify-between cursor-pointer active:bg-neutral-800"><div className="flex items-center gap-3"><Upload className="text-amber-500" /><span className="font-medium text-white">Importar Backup</span></div><ChevronRight className="text-neutral-500" size={20} /><input type="file" accept=".json" className="hidden" ref={fileInputRef} onChange={(e) => { if(e.target.files?.[0]){ const r = new FileReader(); r.onload = async(ev) => await importData(ev.target.result); r.readAsText(e.target.files[0]); } }} /></div>
            </Card>
            <Card className="!p-0 border-rose-900/30">
              {!showConfirmDelete ? (
                <div onClick={() => setShowConfirmDelete(true)} className="p-4 flex items-center gap-3 cursor-pointer text-rose-500"><Trash2 /><span className="font-medium">Apagar todos os dados</span></div>
              ) : (
                <div className="p-4 flex flex-col gap-4 bg-rose-900/10">
                  <div className="flex items-start gap-3 text-rose-400"><AlertCircle size={20} className="shrink-0 mt-0.5" /><span className="font-medium text-sm">Tem certeza? Isso apagará tudo permanentemente.</span></div>
                  <div className="flex gap-2">
                    <button onClick={() => setShowConfirmDelete(false)} className="flex-1 py-2.5 bg-neutral-800 rounded-xl font-medium border border-neutral-700">Cancelar</button>
                    <button onClick={() => { clearData(); setShowConfirmDelete(false); }} className="flex-1 py-2.5 bg-rose-500 text-white rounded-xl font-medium">Apagar</button>
                  </div>
                </div>
              )}
            </Card>
          </div>
        </div>
      );
    };

    const AddTransactionSheet = () => {
      const { isBottomSheetOpen, setBottomSheetOpen, categories, addTransaction, updateTransaction, editingTx } = useAppStore();
      const [quickText, setQuickText] = useState('');
      const { register, handleSubmit, reset, setValue, watch } = useForm({ defaultValues: { type: 'expense', amount: '', categoryId: '', description: '', date: new Date().toISOString().substring(0, 10) } });
      const type = watch('type');
      const filteredCategories = categories.filter(c => c.type === type && c.name !== 'Objetivos'); // Esconde a categoria de sistema

      useEffect(() => {
        if (editingTx) { setValue('type', editingTx.type); setValue('amount', editingTx.amount.toString()); setValue('categoryId', editingTx.categoryId); setValue('description', editingTx.description); setValue('date', editingTx.date.substring(0, 10)); }
        else if (!isBottomSheetOpen) { reset(); setQuickText(''); }
      }, [editingTx, isBottomSheetOpen, setValue, reset]);

      useEffect(() => {
        if (quickText.length > 3) {
          const parsed = parseQuickEntry(quickText, categories);
          if (parsed) { setValue('description', parsed.description || ''); setValue('amount', parsed.amount?.toString() || ''); setValue('categoryId', parsed.categoryId || ''); setValue('type', parsed.type || 'expense'); }
        }
      }, [quickText, categories, setValue]);

      return (
        <AnimatePresence>
          {isBottomSheetOpen && (
            <>
              <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 bg-black/60 backdrop-blur-sm z-40" onClick={() => setBottomSheetOpen(false)} />
              <motion.div initial={{ y: '100%' }} animate={{ y: 0 }} exit={{ y: '100%' }} transition={{ type: 'spring', damping: 25, stiffness: 200 }} className="fixed bottom-0 left-0 right-0 bg-neutral-900 rounded-t-[2rem] z-50 p-6 shadow-2xl h-[85vh] overflow-y-auto">
                <div className="w-12 h-1.5 bg-neutral-700 rounded-full mx-auto mb-6" />
                <h2 className="text-xl font-bold mb-4 text-white">{editingTx ? 'Editar Movimentação' : 'Nova Movimentação'}</h2>
                {!editingTx && (
                  <div className="mb-6 relative">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><BrainCircuit className="text-indigo-400" size={20} /></div>
                    <input type="text" placeholder="Lançamento Mágico (ex: Uber 25)" value={quickText} onChange={(e) => setQuickText(e.target.value)} className="w-full bg-indigo-900/20 text-indigo-100 placeholder-indigo-700/50 rounded-2xl py-4 pl-12 pr-4 font-medium outline-none border border-indigo-900/50" />
                  </div>
                )}
                <form onSubmit={handleSubmit((data) => {
                  const payload = { amount: parseFloat(data.amount), categoryId: data.categoryId, description: data.description, date: new Date(data.date).toISOString(), type: data.type, isRecurring: false };
                  if (editingTx) updateTransaction(editingTx.id, payload); else addTransaction(payload);
                  setBottomSheetOpen(false);
                })} className="space-y-4">
                  <div className="flex bg-neutral-800 rounded-2xl p-1">
                    <button type="button" onClick={() => setValue('type', 'expense')} className={`flex-1 py-3 text-sm font-semibold rounded-xl ${type === 'expense' ? 'bg-neutral-700 shadow text-rose-500' : 'text-neutral-400'}`}>Gasto</button>
                    <button type="button" onClick={() => setValue('type', 'income')} className={`flex-1 py-3 text-sm font-semibold rounded-xl ${type === 'income' ? 'bg-neutral-700 shadow text-emerald-500' : 'text-neutral-400'}`}>Ganho</button>
                  </div>
                  <div className="relative">
                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-neutral-500 font-bold">R$</span>
                    <input {...register('amount')} type="number" step="0.01" placeholder="0,00" className="w-full bg-neutral-800 border border-neutral-700 rounded-2xl py-4 pl-12 pr-4 text-2xl font-bold outline-none text-white" required />
                  </div>
                  <input {...register('description')} type="text" placeholder="Descrição" className="w-full bg-neutral-800 border border-neutral-700 rounded-2xl py-4 px-4 outline-none font-medium text-white placeholder-neutral-500" required />
                  <div className="grid grid-cols-4 gap-2">
                    {filteredCategories.map(cat => (
                      <div key={cat.id} onClick={() => setValue('categoryId', cat.id)} className={`cursor-pointer flex flex-col items-center justify-center p-3 rounded-2xl ${watch('categoryId') === cat.id ? 'bg-indigo-900/50 border-indigo-500' : 'bg-neutral-800 border-transparent'} border`}>
                        <span className="text-2xl mb-1">{cat.emoji}</span><span className="text-[10px] font-medium text-center leading-tight text-neutral-400">{cat.name}</span>
                      </div>
                    ))}
                  </div>
                  <input {...register('date')} type="date" className="w-full bg-neutral-800 border border-neutral-700 rounded-2xl py-4 px-4 text-white font-medium outline-none" required />
                  <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl text-lg mt-4 shadow-lg active:scale-95">{editingTx ? 'Salvar Alterações' : 'Salvar'}</button>
                </form>
              </motion.div>
            </>
          )}
        </AnimatePresence>
      );
    };

    const BottomNav = () => {
      const { currentView, setCurrentView, setBottomSheetOpen } = useAppStore();
      const navItems = [
        { id: 'dashboard', icon: Home, label: 'Início' },
        { id: 'transactions', icon: PieChart, label: 'Extrato' },
        { id: 'add', icon: Plus, label: '', isFab: true },
        { id: 'goals', icon: Target, label: 'Metas' },
        { id: 'debts', icon: FileText, label: 'Dívidas' },
      ];

      return (
        <div className="fixed bottom-0 w-full max-w-md mx-auto bg-neutral-900/90 backdrop-blur-xl border-t border-neutral-800 px-2 py-2 flex justify-between items-center z-30 pb-safe">
          {navItems.map((item, index) => {
            if (item.isFab) {
               return (
                 <motion.button key="fab" whileTap={{ scale: 0.9 }} onClick={() => setBottomSheetOpen(true)} className="bg-indigo-600 text-white p-3 rounded-full shadow-lg shadow-indigo-600/30 -mt-6 mx-1 relative z-10">
                   <Plus size={24} />
                 </motion.button>
               );
            }
            const isActive = currentView === item.id;
            return (
              <button key={item.id} onClick={() => setCurrentView(item.id)} className={`flex flex-col items-center flex-1 p-1 ${isActive ? 'text-indigo-400' : 'text-neutral-500'}`}>
                <item.icon size={22} strokeWidth={isActive ? 2.5 : 2} />
                <span className="text-[9px] font-medium mt-1">{item.label}</span>
              </button>
            );
          })}
        </div>
      );
    };

    const InstallPrompt = () => {
      const [showPrompt, setShowPrompt] = useState(false);
      const [isIOS, setIsIOS] = useState(false);
      const [deferredPrompt, setDeferredPrompt] = useState(null);

      useEffect(() => {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        if (isStandalone) return;

        const isIOSDevice = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
        setIsIOS(isIOSDevice);
        if (isIOSDevice) setTimeout(() => setShowPrompt(true), 3000);

        const handleBeforeInstallPrompt = (e) => { e.preventDefault(); setDeferredPrompt(e); setTimeout(() => setShowPrompt(true), 3000); };
        window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
        return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
      }, []);

      if (!showPrompt) return null;
      const handleInstall = async () => { if (deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; if (outcome === 'accepted') setShowPrompt(false); setDeferredPrompt(null); } };

      return (
        <div className="fixed bottom-24 left-4 right-4 bg-indigo-600 text-white p-4 rounded-2xl shadow-xl z-50 animate-in slide-in-from-bottom-10">
          <button onClick={() => setShowPrompt(false)} className="absolute top-2 right-2 p-1"><X size={16}/></button>
          <p className="font-bold text-lg mb-1 flex items-center gap-2"><Smartphone size={20}/> Instalar App</p>
          <p className="text-sm text-indigo-100 mb-3">Tenha acesso rápido e funcionamento offline.</p>
          {isIOS ? (
             <div className="text-xs bg-indigo-900/50 p-2 rounded-xl">Toque em <b>Compartilhar</b> e escolha <b>Adicionar à Tela de Início</b>.</div>
          ) : (
             <button onClick={handleInstall} className="w-full bg-white text-indigo-600 font-bold py-2 rounded-xl">Instalar Agora</button>
          )}
        </div>
      );
    };

    const App = () => {
      const { initialize, currentView } = useAppStore();
      const [isLoaded, setIsLoaded] = useState(false);

      useEffect(() => { initialize().then(() => setIsLoaded(true)); }, [initialize]);

      if (!isLoaded) return <div className="min-h-screen flex items-center justify-center"><Wallet size={48} className="text-indigo-600 animate-pulse" /></div>;

      return (
        <div className="min-h-screen mx-auto max-w-md relative shadow-2xl overflow-x-hidden">
          <main className="min-h-screen">
            {currentView === 'dashboard' && <DashboardView />}
            {currentView === 'transactions' && <TransactionsTabbedView />}
            {currentView === 'goals' && <GoalsView />}
            {currentView === 'debts' && <DebtsView />}
            {currentView === 'settings' && <SettingsView />}
          </main>
          <BottomNav />
          <AddTransactionSheet />
          <Snackbar />
          <InstallPrompt />
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
